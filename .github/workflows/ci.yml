name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Compile the real firmware for the ESP32-C3. Catches build breakage.
  # ---------------------------------------------------------------------------
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache PlatformIO + pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('Firmware/platformio.ini') }}
      - name: Install PlatformIO + PyYAML
        run: pip install --upgrade platformio pyyaml
      - name: Generate mood table (moods.yaml -> moods.h)
        run: python Utils/generate_moods.py
      - name: Build
        working-directory: Firmware
        run: pio run -e seeed_xiao_esp32c3
      - name: Upload firmware binaries
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: Firmware/.pio/build/seeed_xiao_esp32c3/*.bin

  # ---------------------------------------------------------------------------
  # Run the hardware-independent logic (mood_frame, mood table) on the host.
  # Fast, no emulation.
  # ---------------------------------------------------------------------------
  native-test:
    name: Native unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache PlatformIO + pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('Firmware/platformio.ini') }}
      - name: Install PlatformIO + PyYAML
        run: pip install --upgrade platformio pyyaml
      - name: Generate mood table
        run: python Utils/generate_moods.py
      - name: Run native tests
        working-directory: Firmware
        run: pio test -e native

  # ---------------------------------------------------------------------------
  # Static analysis. Fails the build on any warning/style/perf/portability finding.
  # ---------------------------------------------------------------------------
  cppcheck:
    name: Static analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyYAML + cppcheck
        run: |
          pip install pyyaml
          sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Generate mood table (so moods.h exists for analysis)
        run: python Utils/generate_moods.py
      - name: Run cppcheck
        working-directory: Firmware
        run: |
          cppcheck --enable=warning,style,performance,portability \
            --std=c++17 --language=c++ --error-exitcode=1 --inline-suppr \
            -I include \
            --suppressions-list=.cppcheck-suppressions \
            src
