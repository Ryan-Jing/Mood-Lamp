; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = seeed_xiao_esp32c3

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
lib_deps = adafruit/Adafruit NeoPixel@^1.15.5

; ---------------------------------------------------------------------------
; Host-side unit tests for hardware-independent logic (mood_frame + the mood
; table). Runs on the CI machine's own compiler, no ESP32 needed.
;   Run:  pio test -e native
; build_src_filter keeps only the portable sources so the Arduino-dependent
; files (main/button/led) don't get pulled into the host build.
; ---------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = -<*> +<hal/led_effects.cpp>
build_flags = -std=gnu++17
